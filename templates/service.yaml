---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-gateway-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
    app: service-llm-gateway
    owner-team: {{ .Values.ownerTeam }}
  {{- with .Values.serviceLlmGateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.serviceLlmGateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.serviceLlmGateway.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "llm-gateway-app.selectorLabels" . | nindent 4 }}
