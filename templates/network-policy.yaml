{{- if .Values.serviceLlmGateway.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-gateway-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "llm-gateway-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Traefik to forward HTTP requests into the service
    - ports:
        - protocol: TCP
          port: 3000
    {{- if .Values.serviceLlmGateway.podMonitor.enabled }}
    # Allow Prometheus to scrape the metrics endpoint
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.serviceLlmGateway.podMonitor.namespace | default .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.serviceLlmGateway.podMonitor.metricsPort }}
    {{- end }}
  egress:
    # DNS resolution (kube-dns)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # RabbitMQ
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5672
    # MongoDB
    - ports:
        - protocol: TCP
          port: 27017
    # External LLM provider APIs (OpenAI, Azure, AWS, Anthropic, etc.)
    - to:
        {{- range .Values.serviceLlmGateway.networkPolicy.allowedLLMProviderCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
