{{- if .Values.serviceLlmGateway.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "llm-gateway-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "llm-gateway-app.fullname" . }}
  minReplicas: {{ .Values.serviceLlmGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.serviceLlmGateway.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.serviceLlmGateway.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.serviceLlmGateway.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
