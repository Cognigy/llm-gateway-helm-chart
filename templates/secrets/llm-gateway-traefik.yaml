{{- if and (.Values.ingress.enabled) (.Values.ingress.tls.enabled) (not .Values.ingress.tls.secretName) -}}
{{- if and (.Values.ingress.tls.crt) (.Values.ingress.tls.key) -}}
{{- if not (lookup "v1" "Secret" .Release.Namespace "llm-gateway-traefik") -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-traefik
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.tls.crt | b64enc }}
  tls.key: {{ .Values.ingress.tls.key | b64enc }}
{{- end }}
{{- end }}
{{- end }}
