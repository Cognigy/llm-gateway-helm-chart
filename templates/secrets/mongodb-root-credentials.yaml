{{/*
  MongoDB root-credentials Secret — auto-lookup from source namespace.

  Only rendered when ALL of the following are true:
    - database.type == "mongodb"
    - mongodb.dbinit.enabled == true
    - mongodb.auth.existingSecret is NOT set (BYO secret takes precedence)

  Uses Helm's lookup to read the root password from the mongodb namespace and
  copies it into this release's namespace so the db-init Job can reference it
  via secretKeyRef (which is namespace-scoped).

  Runs as a Helm pre-install/pre-upgrade hook at weight -3 so it exists before
  the mongodb Secret (weight -2) and the db-init Job (weight -1).

  RBAC note: the Helm deployer must have `get` on Secrets in
  mongodb.auth.lookup.namespace. On microk8s / local clusters the default
  kubeconfig is cluster-admin so no extra setup is needed.
*/}}
{{- if and (eq .Values.database.type "mongodb") .Values.mongodb.dbinit.enabled (eq .Values.mongodb.scheme "mongodb") (not .Values.mongodb.auth.existingSecret) }}
{{- $lk := .Values.mongodb.auth.lookup }}
{{- $src := lookup "v1" "Secret" $lk.namespace $lk.secretName }}
{{- if $src }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway-app.fullname" . }}-mongodb-root
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-3"
type: Opaque
stringData:
  username: {{ $lk.usernameValue | quote }}
  password: {{ index $src.data $lk.passwordKey | b64dec | quote }}
{{- else }}
  {{- fail (printf "mongodb.auth.existingSecret is not set and lookup of Secret %s/%s failed — ensure the Secret exists and the Helm deployer can read Secrets in namespace %s" $lk.namespace $lk.secretName $lk.namespace) }}
{{- end }}
{{- end }}
