{{/*
  MongoDB Atlas credentials Secret — auto-creation from literal values.

  Creates a "<fullname>-mongodb-atlas-creds" Secret containing the four keys
  required by the atlas CLI:
    apikeypublic  — Atlas public API key
    apikeyprivate — Atlas private API key
    projectid     — Atlas project ID
    clustername   — Atlas cluster name

  Only rendered when ALL of the following are true:
    - database.type == "mongodb"
    - mongodb.dbinit.enabled == true
    - mongodb.scheme == "mongodb+srv"
    - mongodb.auth.atlas.existingSecret is NOT set (BYO secret takes precedence)

  Fails with a descriptive error if any required literal value is empty.

  Runs as a Helm pre-install/pre-upgrade hook at weight -3 so it exists before
  the mongodb password Secret (weight -2) and the db-init Job (weight -1).
*/}}
{{- if and (eq .Values.database.type "mongodb") .Values.mongodb.dbinit.enabled (eq .Values.mongodb.scheme "mongodb+srv") (not .Values.mongodb.auth.atlas.existingSecret) }}
{{- with .Values.mongodb.auth.atlas }}
{{- if not .projectId    }}{{ fail "mongodb.auth.atlas.projectId is required when mongodb.scheme is \"mongodb+srv\" and mongodb.auth.atlas.existingSecret is not set" }}{{ end }}
{{- if not .clusterName  }}{{ fail "mongodb.auth.atlas.clusterName is required when mongodb.scheme is \"mongodb+srv\" and mongodb.auth.atlas.existingSecret is not set" }}{{ end }}
{{- if not .publicAPIKey }}{{ fail "mongodb.auth.atlas.publicAPIKey is required when mongodb.scheme is \"mongodb+srv\" and mongodb.auth.atlas.existingSecret is not set" }}{{ end }}
{{- if not .privateAPIKey }}{{ fail "mongodb.auth.atlas.privateAPIKey is required when mongodb.scheme is \"mongodb+srv\" and mongodb.auth.atlas.existingSecret is not set" }}{{ end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway-app.fullname" $ }}-mongodb-atlas-creds
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-3"
    "helm.sh/hook-delete-policy": {{ $.Values.mongodb.dbinit.helmHook.deletePolicy }}
type: Opaque
stringData:
  apikeypublic: {{ .publicAPIKey | quote }}
  apikeyprivate: {{ .privateAPIKey | quote }}
  projectid: {{ .projectId | quote }}
  clustername: {{ .clusterName | quote }}
{{- end }}
{{- end }}
