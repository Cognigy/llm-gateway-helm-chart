{{/*
  MongoDB connection secret — standalone auto-generation.

  Creates a "<fullname>-mongodb" Secret containing:
    password:          the service user's password (random 64 chars, preserved across upgrades)
    connection-string: full MongoDB URI for the service user

  Only rendered when:
    - database.type == "mongodb"
    - mongodb.dbinit.enabled == true
    - mongodb.connection.existingSecret is not set (BYO secret takes precedence)

  The Secret is a Helm pre-install/pre-upgrade hook at weight -2 so it exists
  before the db-init Job (weight -1) reads MONGODB_SERVICE_PASSWORD from it.
  No hook-delete-policy is set — the Secret persists so the Deployment can mount it.
*/}}
{{- if and (eq .Values.database.type "mongodb") .Values.mongodb.dbinit.enabled }}
{{- $secretName := printf "%s-mongodb" (include "llm-gateway-app.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if and $existing $existing.data (index $existing.data "password") }}
  {{- $password = index $existing.data "password" | b64dec }}
{{- else }}
  {{- $password = randAlphaNum 64 }}
{{- end }}
{{- $resolvedHosts := tpl .Values.mongodb.hosts . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-2"
type: Opaque
stringData:
  password: {{ $password | quote }}
  {{- if eq .Values.mongodb.scheme "mongodb+srv" }}
  connection-string: {{ printf "mongodb+srv://service-llm-gateway:%s@%s/service-llm-gateway%s" $password $resolvedHosts (.Values.mongodb.params | default "") | quote }}
  {{- else }}
  connection-string: {{ printf "mongodb://service-llm-gateway:%s@%s/service-llm-gateway?authSource=service-llm-gateway%s" $password $resolvedHosts (.Values.mongodb.params | default "") | quote }}
  {{- end }}
{{- end }}
