{{/*
  Application secrets.

  encryptionKey and jwtSecret:
    Auto-generated on first install, preserved across upgrades via lookup + resource-policy: keep.
    Override with existingSecret (Flux/sealed-secrets) or value (local dev).

  callerSecrets:
    Per-caller SERVICE_SECRET_<ID> passwords. Same auto-generation pattern.
    Each entry creates a separate Secret referenced by the Deployment.
*/}}
{{- $fullname := include "llm-gateway-app.fullname" . -}}

{{/* ── Encryption key ── */}}
{{- if not .Values.serviceLlmGateway.encryptionKey.existingSecret }}
{{- $secretName := printf "%s-encryption-key" $fullname }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $key := "" }}
{{- if and $existing $existing.data (index $existing.data "encryption-key") }}
  {{- $key = index $existing.data "encryption-key" | b64dec }}
{{- else if .Values.serviceLlmGateway.encryptionKey.value }}
  {{- $key = .Values.serviceLlmGateway.encryptionKey.value }}
{{- else }}
  {{- $key = randAlphaNum 32 | sha256sum }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  encryption-key: {{ $key | quote }}
{{- end }}

{{/* ── JWT secret ── */}}
{{- if not .Values.serviceLlmGateway.jwtSecret.existingSecret }}
{{- $secretName := printf "%s-jwt-secret" $fullname }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $secret := "" }}
{{- if and $existing $existing.data (index $existing.data "jwt-secret") }}
  {{- $secret = index $existing.data "jwt-secret" | b64dec }}
{{- else if .Values.serviceLlmGateway.jwtSecret.value }}
  {{- $secret = .Values.serviceLlmGateway.jwtSecret.value }}
{{- else }}
  {{- $secret = randAlphaNum 48 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  jwt-secret: {{ $secret | quote }}
{{- end }}

{{/* ── Caller secrets (SERVICE_SECRET_<ID>) ── */}}
{{/* Skip entries that reference a pre-shared existingSecret. */}}
{{- range .Values.serviceLlmGateway.callerSecrets }}
{{- if not .existingSecret }}
{{- $secretName := printf "llm-gateway-caller-%s" .serviceId }}
{{- $existing := lookup "v1" "Secret" $.Release.Namespace $secretName }}
{{- $secret := "" }}
{{- if and $existing $existing.data (index $existing.data "secret") }}
  {{- $secret = index $existing.data "secret" | b64dec }}
{{- else }}
  {{- $secret = randAlphaNum 48 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" $ | nindent 4 }}
    app.kubernetes.io/component: llm-gateway-caller
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  secret: {{ $secret | quote }}
{{- end }}
{{- end }}

{{/* ── MongoDB connection string (local dev / testing fallback) ── */}}
{{/* For production use mongodb.dbinit.enabled=true. */}}
{{- if and (not .Values.mongodb.dbinit.enabled) .Values.mongodb.connectionString }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  connection-string: {{ .Values.mongodb.connectionString | quote }}
  password: ""
{{- end }}
