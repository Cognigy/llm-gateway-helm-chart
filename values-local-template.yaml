# Local development overrides for llm-gateway-app.

global:
    imageRegistry: 'cognigydevelopment.azurecr.io'

# Registry credentials. Omit if the pull secret already exists in the cluster.
imageCredentials:
    registry: 'cognigydevelopment.azurecr.io'
    username: ''
    password: ''
    existingSecret: "cognigy-registry-token"

llmGatewayEnv:
    NODE_ENV: development

# MongoDB connection.
# Two modes — pick one and comment out the other:
#
#   A) Standalone dbinit: chart auto-creates the service user and connection secret.
#      Requires cluster read-access to the MongoDB root credential secret in the mongodb namespace.
#      The chart copies it at hook-weight -3, generates a service password at -2, and runs
#      the db-init Job at -1 before the Deployment starts.
#
#   B) Connection string fallback: provide the URI directly (dbinit is skipped).
#      Use this for simple local dev when MongoDB is already running and provisioned.
mongodb:
    # Mode A: standalone DB initialisation (comment out connectionString below when using this)
    # hosts: "mongodb-0.mongodb-headless.mongodb.svc.cluster.local:27017"
    # dbinit:
    #     enabled: true
    #     image: "cognigydevelopment.azurecr.io/mongodb:6.0.13-debian-11-r21"

    # Mode B: local dev / testing fallback (used when dbinit.enabled is false)
    # Replace username/password with actual credentials. authSource must match the
    # database where the user was created (use "admin" for root/admin users).
    connectionString: "mongodb://service-llm-gateway:password@localhost:27017/service-llm-gateway?authSource=service-llm-gateway&directConnection=true"

serviceLlmGateway:
    replicaCount: 1

    image:
        tag: 'latest'

    # Application secrets for local development.
    # In production these are auto-generated on first install.
    # Providing fixed values here ensures deterministic keys for local testing.
    # ENCRYPTION_KEY must be exactly 64 hex chars — generate with: openssl rand -hex 32
    # JWT_SECRET must be at least 32 characters.
    encryptionKey:
        value: "43d5d6de15bc11777dcad6fbb87078b609f60721961152df6f90795b00ea7b84"
    jwtSecret:
        value: "01234567890123456789012345678901"

    # Authorize services to call llm-gateway. Each entry auto-creates a Secret named
    # "llm-gateway-caller-<serviceId>" and injects SERVICE_SECRET_<ID> into the deployment.
    # Calling services in the same namespace read the same Secret by name.
    callerSecrets:
        - serviceId: service-ai
        - serviceId: service-api
        - serviceId: service-playbook-execution
        - serviceId: service-resources
        - serviceId: service-search-orchestrator

    podMonitor:
        enabled: false
        namespace: observability
        additionalLabels:
            release: kube-prom-stack

    resources:
        requests:
            cpu: 100m
            memory: 128Mi
        limits:
            cpu: 300m
            memory: 256Mi
    rabbitmq:
        existingSecret: "cognigy-rabbitmq"

ingress:
    enabled: true
    host: 'llm-gateway.test'
    tls:
        secretName: 'cognigy-traefik'
